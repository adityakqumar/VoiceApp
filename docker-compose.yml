version: "3.8"

services:
  mongo:
    image: mongo:7
    container_name: voiceapp-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  server:
    build: ./server
    container_name: voiceapp-server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/voiceapp
      - JWT_SECRET=${JWT_SECRET:-voiceapp-dev-secret-change-in-production}
      - CLIENT_URL=http://localhost:3000
    depends_on:
      - mongo
    restart: unless-stopped

  client:
    build:
      context: ./client
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:5000
    container_name: voiceapp-client
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - server
    restart: unless-stopped

volumes:
  mongo_data:
